name: Daily Dashboard Update

on:
  schedule:
    # 6am CEST = 4am UTC (CEST is UTC+2)
    - cron: '0 4 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 pandas requests feedparser google-auth-oauthlib google-auth-httplib2 google-api-python-client pytz yfinance
          
      - name: Run dashboard update script
        run: python github_actions_script.py
        
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "GitHub Actions: Update dashboard data [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push
          else
            echo "No changes to commit"
          fi
