name: Daily Dashboard Update

on:
  schedule:
    # 6am CEST = 4am UTC (CEST is UTC+2)
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install beautifulsoup4 pandas requests feedparser google-auth-oauthlib google-auth-httplib2 google-api-python-client pytz yfinance

      - name: Run dashboard update script
        run: python `github_actions_script`.py

      - name: Configure Git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Pull latest
        run: |
          git pull --rebase origin main

        - name: Commit and push
        run:  |
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "GitHub Actions: Update dashboard data [$(date -u +'%Y-%m-%d %H:%M:%S UTC')]"
            git push origin main
          else
            echo "No changes to commit"
          fi
